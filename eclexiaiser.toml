# eclexiaiser manifest for julianiser

[project]
name = "julianiser"

[[functions]]
name = "main"
source = "src/lib.rs"
energy-budget-mj = 15.0

[carbon]
provider = "static"
region = "GB"
static-intensity = 200.0

[report]
format = "text"
include-recommendations = true
